version: "3.8"

services:
    dev:
        build:
            context: ./
            dockerfile: Dockerfile
            target: development
            args:
                MAPDECK_USER_UID: ${MAPDECK_USER_UID:-1000}
                MAPDECK_USER_GID: ${MAPDECK_USER_GID:-1000}
        ports:
            - "3000:3000"
            - "24678:24678"
        volumes:
            - ../:/app
        environment:
            - NODE_ENV=development
        tty: true
